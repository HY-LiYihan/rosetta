[theme]
# 主题基线（推荐使用 TOML 管理可配置样式）
base = "dark"
primaryColor = "#88D4E1"
backgroundColor = "#161b22"
secondaryBackgroundColor = "#2B474B"
textColor = "#D9E8F3"
linkColor = "#88D4E1"
font = "sans serif"

# 边框与圆角
baseRadius = "0.5rem"
buttonRadius = "0.5rem"
borderColor = "rgba(217, 232, 243, 0.20)"
showWidgetBorder = true
showSidebarBorder = true

# 侧边栏可单独覆盖主题色
[theme.sidebar]
backgroundColor = "#243842"
secondaryBackgroundColor = "#2B474B"
textColor = "#D9E8F3"
primaryColor = "#88D4E1"

[server]
maxUploadSize = 200

[browser]
gatherUsageStats = false
