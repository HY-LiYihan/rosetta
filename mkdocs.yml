site_name: Rosetta
site_description: Streamlit-based local-first agentic annotation tool
site_url: https://hy-liyihan.github.io/rosetta/
repo_url: https://github.com/HY-LiYihan/rosetta
repo_name: HY-LiYihan/rosetta
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - content.action.edit
    - content.code.copy
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search:
      lang:
        - zh
        - en

nav:
  - 首页: README.md
  - 快速使用:
      - 用户教程: user/TUTORIAL.md
  - 研究主张:
      - LLM Agent vs PLM: ideas/RESEARCH_CLAIMS.md
      - Prompt-as-Parameter: ideas/PROMPT_AS_PARAMETER.md
      - 核心想法: ideas/CORE_ANNOTATION_BOOTSTRAP.md
      - 文档评审迭代: developer/DOCS_REVIEW_ITERATIONS.md
  - Workflows:
      - Guideline Bootstrap: developer/BOOTSTRAP_PIPELINE.md
      - Bootstrap Experiments: developer/BOOTSTRAP_EXPERIMENTS.md
      - Legacy Research Pipeline: developer/RESEARCH_PIPELINE.md
      - Corpus Builder: developer/CORPUS_PIPELINE.md
  - 标注格式:
      - 运行时标注格式: developer/ANNOTATION_FORMAT.md
      - JSONL 存储格式: developer/ANNOTATION_JSONL_FORMAT.md
  - 开发维护:
      - 开发者概览: developer/README.md
      - 架构总览: developer/ARCHITECTURE.md
      - LLM 服务运行时: developer/LLM_SERVICE_RUNTIME.md
      - 工作流: developer/WORKFLOW.md
      - 脚本说明: developer/SCRIPTS.md
      - 路线图: developer/ROADMAP.md
  - 部署运维:
      - Docker / Conda 部署: developer/DEPLOYMENT.md
  - 变更记录: CHANGELOG.md

# Links to source code files outside docs/ are intentional (GitHub-only).
# Suppress validation errors so the build doesn't fail on them.
validation:
  links:
    not_found: ignore
    unrecognized_links: ignore
